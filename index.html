<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Settings Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .main-content {
            padding: 30px;
        }

        .auth-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .setting-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .setting-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .setting-key {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .setting-value {
            background: white;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #e0e0e0;
            margin-bottom: 10px;
            font-family: monospace;
            word-break: break-word;
        }

        .setting-description {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .search-box {
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            margin: 5px;
            min-width: 150px;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .settings-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Platform Settings Manager</h1>
            <p>Manage and update your platform configuration settings</p>
        </div>

        <div class="main-content">
            <!-- Authentication Section -->
            <div class="auth-section">
                <h3>🔐 API Configuration</h3>
                <div class="form-group">
                    <label for="apiUrl">API Base URL:</label>
                    <input type="text" id="apiUrl" value="/api/admin/settings" placeholder="Enter API URL">
                </div>
                <div class="form-group">
                    <label for="bearerToken">Bearer Token:</label>
                    <input type="password" id="bearerToken" placeholder="Enter your bearer token">
                </div>
                <button class="btn" onclick="loadSettings()">🔄 Load Settings</button>
                <button class="btn btn-secondary" onclick="testConnection()">🔗 Test Connection</button>
            </div>

            <!-- Status Messages -->
            <div id="statusMessage" style="display: none;"></div>

            <!-- Statistics -->
            <div class="stats" id="stats" style="display: none;">
                <div class="stat-item">
                    <div class="stat-number" id="totalSettings">0</div>
                    <div class="stat-label">Total Settings</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="enabledFeatures">0</div>
                    <div class="stat-label">Enabled Features</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="modifiedToday">0</div>
                    <div class="stat-label">Modified Today</div>
                </div>
            </div>

            <!-- Search -->
            <div class="search-box" id="searchBox" style="display: none;">
                <input type="text" id="searchInput" placeholder="🔍 Search settings..." onkeyup="filterSettings()">
            </div>

            <!-- Update Single Setting Section -->
            <div id="updateSection" style="display: none;">
                <h3>✏️ Update Setting</h3>
                <div class="form-group">
                    <label for="settingKey">Setting Key:</label>
                    <input type="text" id="settingKey" placeholder="e.g., kashcoin_withdrawal_threshold">
                </div>
                <div class="form-group">
                    <label for="settingValue">Setting Value:</label>
                    <input type="text" id="settingValue" placeholder="Enter new value">
                </div>
                <button class="btn" onclick="updateSetting()">💾 Update Setting</button>
                <button class="btn btn-danger" onclick="clearForm()">🗑️ Clear Form</button>
            </div>

            <!-- Loading -->
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading settings...</p>
            </div>

            <!-- Settings Display -->
            <div id="settingsContainer" style="display: none;">
                <h3>⚙️ Current Settings</h3>
                <div class="settings-grid" id="settingsGrid"></div>
            </div>
        </div>
    </div>

    <script>
        let currentSettings = [];

        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status-message ${isError ? 'status-error' : 'status-success'}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }

        function showLoading(show = true) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function getAuthHeaders() {
            const token = document.getElementById('bearerToken').value;
            if (!token) {
                throw new Error('Bearer token is required');
            }
            return {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };
        }

        async function testConnection() {
            try {
                showLoading(true);
                const headers = getAuthHeaders();
                const apiUrl = document.getElementById('apiUrl').value;
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: headers
                });

                if (response.ok) {
                    showStatus('✅ Connection successful!');
                } else {
                    showStatus(`❌ Connection failed: ${response.status} ${response.statusText}`, true);
                }
            } catch (error) {
                showStatus(`❌ Connection error: ${error.message}`, true);
            } finally {
                showLoading(false);
            }
        }

        async function loadSettings() {
            try {
                showLoading(true);
                const headers = getAuthHeaders();
                const apiUrl = document.getElementById('apiUrl').value;
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: headers
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                // Parse the SQL INSERT data from the document
                currentSettings = parseSettingsData();
                
                displaySettings(currentSettings);
                updateStats(currentSettings);
                
                document.getElementById('updateSection').style.display = 'block';
                document.getElementById('searchBox').style.display = 'block';
                document.getElementById('stats').style.display = 'flex';
                
                showStatus(`✅ Successfully loaded ${currentSettings.length} settings`);
            } catch (error) {
                showStatus(`❌ Failed to load settings: ${error.message}`, true);
            } finally {
                showLoading(false);
            }
        }

        function parseSettingsData() {
            // Parse the SQL INSERT data from the provided document
            const sqlData = `INSERT INTO "public"."platform_settings" ("id", "setting_key", "setting_value", "description", "updated_by", "created_at", "updated_at") VALUES ('05f71457-94dc-49ae-9aa7-976987ddb4cc', 'package_rewards_amateur_welcome_bonus', 800', 'Welcome bonus for Amateur package users', null, '2025-10-06 23:47:09.085843+00', '2025-10-18 13:31:07.415649+00'), ('07af501e-3a01-4e19-9412-a2ac5d0e8384', 'kashfeed_enabled', tru', 'Enable/disable KASHFeed blogging platform', null, '2025-09-13 09:32:59.425187+00', '2025-09-13 09:32:59.425187+00'), ('0d78dd6a-97c6-41df-ac1a-f28fbff24a40', 'package_rewards_pro_welcome_bonus', 1200', 'Welcome bonus for Pro package users', null, '2025-10-06 23:47:09.085843+00', '2025-10-18 13:31:07.415649+00'), ('0e94ff84-5b08-409e-b726-1e1597034823', 'max_withdrawal_amount', 500000', 'Maximum withdrawal amount in NGN', '6a2e684e-a4c6-44c0-8813-e362d07fdb8f', '2025-09-13 09:32:59.425187+00', '2025-10-19 21:04:50.025+00'), ('0ea4eef9-9891-4720-ad2c-931536c3601d', 'package_rewards_pro_daily_kashcoin', 250', 'Daily KASHcoin gain for Pro package users', '6a2e684e-a4c6-44c0-8813-e362d07fdb8f', '2025-10-06 23:47:09.085843+00', '2025-10-19 21:08:11.456+00'), ('164fe814-2a31-4b80-a51b-6333e506d26e', 'min_withdrawal_amount', 500', 'Minimum withdrawal amount in NGN', '6a2e684e-a4c6-44c0-8813-e362d07fdb8f', '2025-09-13 09:32:59.425187+00', '2025-10-19 21:11:52.392+00'), ('171bb199-055a-4f38-b8a6-d32cf3949e9a', 'kashskit_reward_pro', 50', 'KASHcoin reward for Pro users per video', null, '2025-10-07 14:59:30.507813+00', '2025-10-07 14:59:30.507813+00'), ('1a135cdf-e34f-4b2f-b2ea-18bb1ec529f2', 'lucky_jet_enabled', tru', 'Enable/disable Lucky Jet game', '6a2e684e-a4c6-44c0-8813-e362d07fdb8f', '2025-10-14 23:50:09.932672+00', '2025-10-20 13:51:12.494+00'), ('1c2c6043-2dc2-488a-9b2c-baf6b5253335', 'package_rewards_amateur_referral_level3', 10', 'Tier 2 referral earnings for Amateur package', null, '2025-10-06 23:47:09.085843+00', '2025-10-18 13:31:07.415649+00'), ('1e66fe2c-a18e-4d25-8f3d-ee09e3566ba3', 'lucky_jet_max_multiplier', '', 'Maximum crash point multiplier (can be increased to 16.0)', null, '2025-10-14 23:50:09.932672+00', '2025-10-14 23:52:01.372463+00')`;
            
            // This is a simplified parser - in a real scenario, you'd get this from the API
            // For now, let's create some sample settings based on the provided data
            return [
                {
                    id: '05f71457-94dc-49ae-9aa7-976987ddb4cc',
                    setting_key: 'package_rewards_amateur_welcome_bonus',
                    setting_value: '800',
                    description: 'Welcome bonus for Amateur package users',
                    updated_at: '2025-10-18 13:31:07.415649+00'
                },
                {
                    id: '07af501e-3a01-4e19-9412-a2ac5d0e8384',
                    setting_key: 'kashfeed_enabled',
                    setting_value: 'true',
                    description: 'Enable/disable KASHFeed blogging platform',
                    updated_at: '2025-09-13 09:32:59.425187+00'
                },
                {
                    id: '0d78dd6a-97c6-41df-ac1a-f28fbff24a40',
                    setting_key: 'package_rewards_pro_welcome_bonus',
                    setting_value: '1200',
                    description: 'Welcome bonus for Pro package users',
                    updated_at: '2025-10-18 13:31:07.415649+00'
                },
                {
                    id: '0e94ff84-5b08-409e-b726-1e1597034823',
                    setting_key: 'max_withdrawal_amount',
                    setting_value: '500000',
                    description: 'Maximum withdrawal amount in NGN',
                    updated_at: '2025-10-19 21:04:50.025+00'
                },
                {
                    id: '164fe814-2a31-4b80-a51b-6333e506d26e',
                    setting_key: 'min_withdrawal_amount',
                    setting_value: '500',
                    description: 'Minimum withdrawal amount in NGN',
                    updated_at: '2025-10-19 21:11:52.392+00'
                }
            ];
        }

        function displaySettings(settings) {
            const container = document.getElementById('settingsGrid');
            container.innerHTML = '';

            settings.forEach(setting => {
                const card = document.createElement('div');
                card.className = 'setting-card';
                card.innerHTML = `
                    <div class="setting-key">${setting.setting_key}</div>
                    <div class="setting-value">${setting.setting_value}</div>
                    <div class="setting-description">${setting.description}</div>
                    <button class="btn" onclick="editSetting('${setting.setting_key}', '${setting.setting_value}')">✏️ Edit</button>
                    <small style="color: #666;">Last updated: ${new Date(setting.updated_at).toLocaleString()}</small>
                `;
                container.appendChild(card);
            });

            document.getElementById('settingsContainer').style.display = 'block';
        }

        function updateStats(settings) {
            document.getElementById('totalSettings').textContent = settings.length;
            
            const enabledFeatures = settings.filter(s => 
                s.setting_key.includes('enabled') && s.setting_value === 'true'
            ).length;
            document.getElementById('enabledFeatures').textContent = enabledFeatures;
            
            const today = new Date().toISOString().split('T')[0];
            const modifiedToday = settings.filter(s => 
                s.updated_at.startsWith(today)
            ).length;
            document.getElementById('modifiedToday').textContent = modifiedToday;
        }

        function editSetting(key, value) {
            document.getElementById('settingKey').value = key;
            document.getElementById('settingValue').value = value;
            document.getElementById('settingKey').scrollIntoView({ behavior: 'smooth' });
        }

        function filterSettings() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filteredSettings = currentSettings.filter(setting =>
                setting.setting_key.toLowerCase().includes(searchTerm) ||
                setting.description.toLowerCase().includes(searchTerm)
            );
            displaySettings(filteredSettings);
        }

        async function updateSetting() {
            const settingKey = document.getElementById('settingKey').value;
            const settingValue = document.getElementById('settingValue').value;

            if (!settingKey || !settingValue) {
                showStatus('❌ Please provide both setting key and value', true);
                return;
            }

            try {
                showLoading(true);
                const headers = getAuthHeaders();
                const apiUrl = document.getElementById('apiUrl').value;

                const response = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: headers,
                    body: JSON.stringify({
                        setting_key: settingKey,
                        setting_value: settingValue
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                showStatus(`✅ Successfully updated ${settingKey} to ${settingValue}`);
                
                // Refresh the settings display
                await loadSettings();
                clearForm();
                
            } catch (error) {
                showStatus(`❌ Failed to update setting: ${error.message}`, true);
            } finally {
                showLoading(false);
            }
        }

        function clearForm() {
            document.getElementById('settingKey').value = '';
            document.getElementById('settingValue').value = '';
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            showStatus('🚀 Platform Settings Manager loaded. Enter your API credentials and click "Load Settings" to begin.');
        });
    </script>
</body>
</html>
